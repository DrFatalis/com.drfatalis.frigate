<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frigate NVR Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; color: #1a1a1a; background: #fff; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
    .section { margin-bottom: 32px; }
    .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .toggle-label { font-size: 14px; cursor: pointer; user-select: none; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    #log-area {
      width: 100%;
      height: 320px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      resize: vertical;
      color: #333;
      white-space: pre;
      overflow: auto;
    }
    button {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f9f9f9;
      cursor: pointer;
      color: #333;
    }
    button:hover { background: #eee; }
    button.danger { border-color: #e57373; color: #c62828; background: #fff5f5; }
    button.danger:hover { background: #ffebee; }
    .btn-row { display: flex; gap: 8px; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #00a0e1; }
  </style>
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>
<body>

  <div class="section">
    <h2>Debug</h2>
    <div class="row">
      <input type="checkbox" id="debug_mqtt">
      <label class="toggle-label" for="debug_mqtt">Log all MQTT messages</label>
    </div>
    <div class="hint">When enabled, every raw MQTT message is captured in the log below. Disable when not needed.</div>
  </div>

  <div class="section">
    <div class="log-header">
      <h2>MQTT Debug Log <span style="font-weight:400;font-size:13px;color:#888">(last 100 entries)</span></h2>
      <div class="btn-row">
        <button id="btn-refresh">Refresh</button>
        <button id="btn-clear" class="danger">Clear log</button>
      </div>
    </div>
    <div id="log-area">(loading…)</div>
    <div class="hint" style="margin-top:6px">Auto-updated every 5 s when debug is enabled. Click Refresh to fetch immediately.</div>
  </div>

  <script>
    function onHomeyReady(Homey) {
      var pollTimer = null;

      // --- toggle ---
      var checkbox = document.getElementById('debug_mqtt');
      Homey.get('debug_mqtt', function(err, value) {
        checkbox.checked = value === true;
        updatePoll(checkbox.checked);
        Homey.ready();
      });

      checkbox.addEventListener('change', function() {
        var enabled = checkbox.checked;
        Homey.set('debug_mqtt', enabled, function(err) {
          if (err) Homey.alert('Could not save setting: ' + err);
        });
        updatePoll(enabled);
      });

      // --- log ---
      function loadLog() {
        Homey.get('debug_log', function(err, value) {
          var el = document.getElementById('log-area');
          if (err) { el.textContent = 'Error loading log: ' + err; return; }
          var text = typeof value === 'string' ? value : '';
          el.textContent = text.length > 0 ? text : '(no entries yet)';
          el.scrollTop = el.scrollHeight;
        });
      }

      loadLog();

      document.getElementById('btn-refresh').addEventListener('click', loadLog);

      document.getElementById('btn-clear').addEventListener('click', function() {
        Homey.confirm(
          'Clear the MQTT debug log?',
          'warning',
          function(err, confirmed) {
            if (!confirmed) return;
            Homey.set('debug_log', '', function(err2) {
              if (err2) { Homey.alert('Could not clear log: ' + err2); return; }
              document.getElementById('log-area').textContent = '(no entries yet)';
            });
          }
        );
      });

      // --- auto-poll every 5 s when debug is enabled ---
      function updatePoll(enabled) {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        if (enabled) { pollTimer = setInterval(loadLog, 5000); }
      }
    }
  </script>
</body>
</html>
