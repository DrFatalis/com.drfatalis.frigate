<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    .camera-list { margin: 8px 0 12px; }
    .camera-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      margin-bottom: 6px;
      background: #f0f4f8;
      border: 1px solid #d0d8e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }
    .camera-item:hover { background: #e0eaf4; border-color: #00a0e1; }
    .camera-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 8px; }
    .toolbar button {
      font-size: 0.82em;
      padding: 4px 10px;
      border: 1px solid #d0d8e0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .toolbar button:hover { background: #e0eaf4; border-color: #00a0e1; }
    .separator { color: #888; font-size: 0.85em; margin: 14px 0 8px; }
  </style>
</head>
<body>

<div id="discoveredSection" style="display:none;">
  <p data-i18n="pair.selectCamera" style="font-weight:bold;margin:0 0 6px;"></p>
  <div class="toolbar">
    <button id="selectAllBtn" data-i18n="pair.selectAll"></button>
    <button id="deselectAllBtn" data-i18n="pair.deselectAll"></button>
  </div>
  <div class="camera-list" id="cameraList"></div>
  <p class="separator" data-i18n="pair.orManual"></p>
</div>

<div class="homey-form-group">
  <label class="homey-form-label" for="manualCamera" data-i18n="pair.manualCamera"></label>
  <input class="homey-form-input" id="manualCamera" type="text" placeholder="doorbell, entrance, garage" value="" />
  <small data-i18n="pair.manualCameraHint" style="color:#888;font-size:0.85em;display:block;margin-top:4px;"></small>
</div>

<div class="homey-form-group" id="statusGroup" style="display:none;">
  <label class="homey-form-label" id="statusText" style="white-space:pre-line;"></label>
</div>

<button id="addBtn" class="homey-button-primary-full" data-i18n="pair.addCameras"></button>

<script type="application/javascript">
  Homey.setTitle(Homey.__('pair.cameraTitle'));

  var addBtn = document.getElementById('addBtn');
  var statusGroup = document.getElementById('statusGroup');
  var statusText = document.getElementById('statusText');
  var manualInput = document.getElementById('manualCamera');

  function showStatus(msg, isError) {
    statusText.textContent = msg;
    statusText.style.color = isError ? '#e74c3c' : '#27ae60';
    statusGroup.style.display = 'block';
  }

  document.getElementById('selectAllBtn').addEventListener('click', function () {
    document.querySelectorAll('.camera-checkbox').forEach(function (cb) { cb.checked = true; });
  });

  document.getElementById('deselectAllBtn').addEventListener('click', function () {
    document.querySelectorAll('.camera-checkbox').forEach(function (cb) { cb.checked = false; });
  });

  Homey.emit('get_pair_settings').then(function (settings) {
    if (settings.cameras && settings.cameras.length > 0) {
      var section = document.getElementById('discoveredSection');
      var list = document.getElementById('cameraList');
      section.style.display = 'block';

      settings.cameras.forEach(function (name) {
        var label = document.createElement('label');
        label.className = 'camera-item';

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'camera-checkbox';
        cb.value = name;
        cb.checked = true;

        label.appendChild(cb);
        label.appendChild(document.createTextNode('📷 ' + name));
        list.appendChild(label);
      });
    }

    window._pairSettings = settings;
  }).catch(function () {
    window._pairSettings = {};
  });

  addBtn.addEventListener('click', function () {
    var selected = [];

    document.querySelectorAll('.camera-checkbox:checked').forEach(function (cb) {
      selected.push(cb.value);
    });

    var manual = manualInput.value.trim();
    if (manual) {
      manual.split(',').forEach(function (n) {
        n = n.trim();
        if (n && selected.indexOf(n) === -1) selected.push(n);
      });
    }

    if (selected.length === 0) {
      Homey.alert(Homey.__('pair.alertEmptyCameraName'));
      return;
    }

    addBtn.disabled = true;
    showStatus(Homey.__('pair.adding'), false);

    var s = window._pairSettings || {};
    var errors = [];
    var index = 0;

    function createNext() {
      if (index >= selected.length) {
        if (errors.length > 0) {
          addBtn.disabled = false;
          showStatus(errors.join('\n'), true);
        } else {
          Homey.done();
        }
        return;
      }

      var cameraName = selected[index++];
      Homey.createDevice({
        name: cameraName,
        data: { id: 'frigate-camera-' + cameraName },
        settings: {
          mqtt_url:             s.mqtt_url            || '',
          mqtt_username:        s.mqtt_username       || '',
          mqtt_password:        s.mqtt_password       || '',
          mqtt_topic_prefix:    s.mqtt_topic_prefix   || 'frigate',
          camera_name:          cameraName,
          frigate_url:          s.frigate_url         || '',
          frigate_local_url:    s.frigate_local_url   || '',
          label_filter:         '',
          live_stream_interval: 500,
        }
      }).then(function () {
        createNext();
      }).catch(function (err) {
        errors.push(cameraName + ': ' + ((err && err.message) || Homey.__('pair.addFailed')));
        createNext();
      });
    }

    createNext();
  });
</script>

</body>
</html>
