<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body>

<fieldset class="homey-form-fieldset">
  <legend style="font-weight:bold;margin-bottom:8px;" data-i18n="pair.sectionMQTT"></legend>

  <div class="homey-form-group">
    <label class="homey-form-label" for="mqttUrl" data-i18n="pair.mqttUrl"></label>
    <input class="homey-form-input" id="mqttUrl" type="text" placeholder="mqtt://192.168.1.100:1883" value="" />
    <small data-i18n="pair.mqttUrlHint" style="color:#888;font-size:0.85em;display:block;margin-top:4px;"></small>
  </div>
  <div class="homey-form-group">
    <label class="homey-form-label" for="mqttUsername" data-i18n="pair.mqttUsername"></label>
    <input class="homey-form-input" id="mqttUsername" type="text" value="" />
  </div>
  <div class="homey-form-group">
    <label class="homey-form-label" for="mqttPassword" data-i18n="pair.mqttPassword"></label>
    <input class="homey-form-input" id="mqttPassword" type="password" value="" />
  </div>
  <div class="homey-form-group">
    <label class="homey-form-label" for="mqttPrefix" data-i18n="pair.mqttPrefix"></label>
    <input class="homey-form-input" id="mqttPrefix" type="text" value="frigate" />
    <small data-i18n="pair.mqttPrefixHint" style="color:#888;font-size:0.85em;display:block;margin-top:4px;"></small>
  </div>
</fieldset>

<fieldset class="homey-form-fieldset" style="margin-top:16px;">
  <legend style="font-weight:bold;margin-bottom:8px;" data-i18n="pair.sectionOptional"></legend>
  <div class="homey-form-group">
    <label class="homey-form-label" for="frigateUrl" data-i18n="pair.frigateUrl"></label>
    <input class="homey-form-input" id="frigateUrl" type="text" placeholder="http://192.168.1.100:5000" value="" />
    <small data-i18n="pair.frigateUrlHint" style="color:#888;font-size:0.85em;display:block;margin-top:4px;"></small>
  </div>
</fieldset>

<div class="homey-form-group" id="statusGroup" style="display:none;margin-top:8px;">
  <label class="homey-form-label" id="statusText"></label>
</div>

<button id="connectBtn" class="homey-button-primary-full" style="margin-top:16px;" data-i18n="pair.connect"></button>

<script type="application/javascript">
  Homey.setTitle(Homey.__('pair.title'));

  var connectBtn = document.getElementById('connectBtn');
  var statusGroup = document.getElementById('statusGroup');
  var statusText = document.getElementById('statusText');

  function showStatus(msg, isError) {
    statusText.textContent = msg;
    statusText.style.color = isError ? '#e74c3c' : '#27ae60';
    statusGroup.style.display = 'block';
  }

  connectBtn.addEventListener('click', function () {
    var mqttUrl = document.getElementById('mqttUrl').value.trim();
    var mqttUsername = document.getElementById('mqttUsername').value.trim();
    var mqttPassword = document.getElementById('mqttPassword').value;
    var mqttPrefix = document.getElementById('mqttPrefix').value.trim() || 'frigate';
    var frigateUrl = document.getElementById('frigateUrl').value.trim();

    if (!/^mqtts?:\/\/.+/.test(mqttUrl)) {
      Homey.alert(Homey.__('pair.alertInvalidMqttUrl'));
      return;
    }

    connectBtn.disabled = true;
    showStatus(Homey.__('pair.connecting'), false);

    Homey.emit('validate_credentials', {
      mqtt_url: mqttUrl,
      mqtt_username: mqttUsername,
      mqtt_password: mqttPassword,
      mqtt_topic_prefix: mqttPrefix,
      frigate_url: frigateUrl
    })
      .then(function () {
        Homey.nextView();
      })
      .catch(function (err) {
        connectBtn.disabled = false;
        var msg = (err && err.message) ? err.message : Homey.__('pair.connectFailed');
        showStatus(msg, true);
      });
  });
</script>

</body>
</html>
